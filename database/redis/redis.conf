# Redis 配置 - JARVIS 项目
# 参考：https://redis.io/docs/latest/operate/oss_and_stack/install/install-stack/docker/

# 持久化：启用 AOF + RDB 双保险
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# 内存限制（开发环境 256MB，生产按需调整）
maxmemory 256mb
maxmemory-policy allkeys-lru

# 安全：绑定所有接口（Docker 网络内部访问）
bind 0.0.0.0
protected-mode yes
