# docker-compose.override.yml
# WARNING: Dev-only overrides. Do NOT use in production.
# 本地开发自动合并此文件，生产部署用:
#   docker compose -f docker-compose.yml up -d
services:
  backend:
    environment:
      UVICORN_RELOAD: "1"
    volumes:
      # Mount only source code — preserves .venv built into the image.
      # Uvicorn --reload watches app/ for changes.
      # tests/ intentionally omitted; run pytest locally via uv, not in the container.
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"

  traefik:
    # command replaces (not appends) the base list, so all base flags must be repeated here
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "8080:8080"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  qdrant:
    ports:
      - "6333:6333"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"
