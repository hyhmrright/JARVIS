repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: ^\.devcontainer/
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.24
    hooks:
      - id: uv-lock
        name: Check uv.lock is up-to-date
        files: ^(uv\.lock|pyproject\.toml)$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff-check
        name: Ruff lint (auto-fix)
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: Ruff format
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: frontend-lint
        name: ESLint (frontend)
        language: system
        entry: bash -c 'cd frontend && bun run lint'
        files: ^frontend/src/.*\.(ts|vue)$
        pass_filenames: false

      - id: frontend-type-check
        name: TypeScript type check (frontend)
        language: system
        entry: bash -c 'cd frontend && bun run type-check'
        files: ^frontend/src/.*\.(ts|vue)$
        pass_filenames: false

      - id: pyright
        name: Pyright type check (backend)
        language: system
        entry: uv run pyright backend
        files: ^backend/.*\.py$
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

default_stages: [pre-commit]
default_language_version:
  python: python3.13

exclude: |
  (?x)^(
    .*\.egg-info/|
    \.eggs/|
    \.git/|
    \.hg/|
    \.mypy_cache/|
    \.nox/|
    \.tox/|
    \.ruff_cache/|
    \.venv/|
    __pycache__/|
    build/|
    dist/|
    node_modules/
  )
