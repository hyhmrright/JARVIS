name: "Feature Request"
description: "Suggest a new feature or improvement"
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: component
    attributes:
      label: "Target Component"
      options:
        - "Frontend (Vue)"
        - "Backend API (FastAPI)"
        - "Agent / LLM"
        - "RAG Pipeline"
        - "Docker / Infrastructure"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem"
      description: "What problem does this feature solve?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe your proposed solution"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Any alternative solutions you've considered"

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Screenshots, mockups, or references"
