name: "Bug Report"
description: "Report a reproducible bug"
labels: ["bug", "needs-triage"]
body:
  - type: input
    id: version
    attributes:
      label: "JARVIS Version"
      description: "Commit SHA or Docker image tag"
      placeholder: "e.g. 038f899 or latest"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: "Affected Component"
      options:
        - "Frontend (Vue)"
        - "Backend API (FastAPI)"
        - "Agent / LLM"
        - "RAG Pipeline"
        - "Docker / Infrastructure"
        - "Authentication"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "A clear description of the bug"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      placeholder: |
        - OS: macOS 15.3
        - Browser: Chrome 132
        - Docker: 27.x
        - Python: 3.13

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Screenshots"
      description: "Paste relevant logs or attach screenshots"
