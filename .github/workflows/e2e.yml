name: E2E Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: "Playwright E2E"
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: jarvis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:RELEASE.2024-01-28T22-35-53Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
          - 9001:9001
        command: server /data --console-address ":9001"

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.13.12"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd backend && uv sync
          cd ../frontend && npm install -g bun && bun install
      - name: Install Playwright Browsers
        run: cd frontend && bun x playwright install --with-deps chromium
      - name: Run Playwright tests
        run: cd frontend && bun x playwright test
        env:
          CI: true
          DATABASE_URL: postgresql+asyncpg://jarvis:testpass@localhost:5432/jarvis_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          ENCRYPTION_KEY: Y2ktdGVzdC1mZXJuZXQta2V5LXBhZGRpbmctamFydmk=
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          POSTGRES_PASSWORD: testpass
