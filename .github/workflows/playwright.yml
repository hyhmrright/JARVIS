name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: "Backend Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.13.12"
      - run: uv sync --frozen
        working-directory: backend
      - run: uv run ruff check .
        working-directory: backend
      - run: uv run ruff format --check .
        working-directory: backend

  backend-type:
    name: "Backend Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.13.12"
      - uses: actions/cache@v5
        with:
          path: backend/.mypy_cache
          key: mypy-${{ runner.os }}-${{ runner.arch }}-py3.13-${{ hashFiles('backend/uv.lock') }}
          restore-keys: mypy-${{ runner.os }}-${{ runner.arch }}-py3.13-
      - run: uv sync --frozen
        working-directory: backend
      - run: uv run mypy app --cache-dir .mypy_cache
        working-directory: backend

  backend-test:
    name: "Backend Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: jarvis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.13.12"
      - run: uv sync --frozen
        working-directory: backend
      - run: uv run pytest tests/ -v --tb=short
        working-directory: backend
        env:
          DATABASE_URL: "postgresql+asyncpg://jarvis:testpass@localhost:5432/jarvis_test"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-jwt-secret-not-for-production"
          ENCRYPTION_KEY: "Y2ktdGVzdC1mZXJuZXQta2V5LXBhZGRpbmctamFydmk="
          MINIO_ACCESS_KEY: "ci-test-minio-access"
          MINIO_SECRET_KEY: "ci-test-minio-secret"
          POSTGRES_PASSWORD: "testpass"

  frontend-lint:
    name: "Frontend Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run lint
        working-directory: frontend

  frontend-type:
    name: "Frontend Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run type-check
        working-directory: frontend
